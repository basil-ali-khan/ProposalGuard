name: Trigger auto deployment for proposalguard

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ deployment ]
    paths:
    - '**'
    - '.github/workflows/proposalguard-AutoDeployTrigger-1b6cdedf-b548-4772-97de-3eee9423e12e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PROPOSALGUARD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PROPOSALGUARD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PROPOSALGUARD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: proposalguardregistry.azurecr.io
          registryUsername: ${{ secrets.PROPOSALGUARD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PROPOSALGUARD_REGISTRY_PASSWORD }}
          containerAppName: proposalguard
          resourceGroup: resource_group_anas
          imageToBuild: proposalguardregistry.azurecr.io/proposalguard:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


