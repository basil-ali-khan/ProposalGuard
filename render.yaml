services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: proposalguard-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: ProposalGuard
      - key: CHROMA_DB_PATH
        value: ./chroma_db_data
      - key: CHROMA_ONNX_DISABLE
        value: "1"
      - key: ALLOWED_ORIGINS
        sync: false   # set this to your frontend URL after deploying frontend

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: proposalguard-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # set this to your backend URL after deploying backend
